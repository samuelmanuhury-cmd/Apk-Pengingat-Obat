<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengingat Obat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="device-frame">
  <main class="app-shell">
    <section class="top-panel">
      <div class="top-left">
        <div class="status-dot"></div>
        <div>
          <p class="subtitle">Pengingat Obat</p>
          <p class="date">Selasa, 22 April 2026</p>
        </div>
      </div>
      <button class="bell-button" aria-label="Notifikasi">
        <span class="bell-icon">🔔</span>
        <span class="badge">3</span>
      </button>
    </section>

    <section class="card progress-card">
      <div class="card-title">
        <div>
          <p class="card-label">Progress Hari Ini</p>
          <p class="card-subtitle">2/5</p>
        </div>
        <span class="small-chip">Sedang</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 42%"></div>
      </div>
      <p class="progress-note">3 obat lagi untuk hari ini</p>
    </section>

    <section class="section-block">
      <h2>Jadwal Hari Ini</h2>
      <div class="schedule-list">
        <article class="schedule-card active">
          <div class="pill-icon pill-pink">💊</div>
          <div class="schedule-text">
            <p class="item-title done">Paracetamol</p>
            <p class="item-detail">08:00 • 500mg</p>
          </div>
          <button class="circle-toggle done"><span>✓</span></button>
        </article>

        <article class="schedule-card active">
          <div class="pill-icon pill-orange">🍊</div>
          <div class="schedule-text">
            <p class="item-title done">Vitamin C</p>
            <p class="item-detail">08:00 • 1000mg</p>
          </div>
          <button class="circle-toggle done"><span>✓</span></button>
        </article>

        <article class="schedule-card">
          <div class="pill-icon pill-blue">💊</div>
          <div class="schedule-text">
            <p class="item-title">Amoxicillin</p>
            <p class="item-detail">14:00 • 250mg</p>
          </div>
          <button class="circle-toggle"></button>
        </article>

        <article class="schedule-card">
          <div class="pill-icon pill-pink">💊</div>
          <div class="schedule-text">
            <p class="item-title">Paracetamol</p>
            <p class="item-detail">20:00 • 500mg</p>
          </div>
          <button class="circle-toggle"></button>
        </article>

        <article class="schedule-card">
          <div class="pill-icon pill-blue">💊</div>
          <div class="schedule-text">
            <p class="item-title">Antibiotik</p>
            <p class="item-detail">22:00 • 250mg</p>
          </div>
          <button class="circle-toggle"></button>
        </article>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-view="today">
      <span>📅</span>
      <span>Hari Ini</span>
    </button>
    <button class="nav-item" data-view="medications">
      <span>💊</span>
      <span>Obat</span>
    </button>
    <button class="nav-item" data-view="history">
      <span>⏱️</span>
      <span>Riwayat</span>
    </button>
  </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
